services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: memora-postgres
    environment:
      POSTGRES_DB: memora
      POSTGRES_USER: memora
      POSTGRES_PASSWORD: memora_dev_password
    ports:
      - "5432:5432"
    volumes:
      - memora_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memora -d memora"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  memora_pgdata:
